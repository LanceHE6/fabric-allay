name: Build & Release

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build all versions
        run: ./gradlew buildAll --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: dist/*.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: ./outputs/

      - name: Get mod version
        id: get_mod_ver
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
          echo "mod_version=$MOD_VER" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate changelog
        run: |
          git-cliff --latest -o CHANGELOG_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ env.MOD_VERSION }}
          tag_name: V${{ env.MOD_VERSION }}
          body_path: CHANGELOG_BODY.md
          files: ./outputs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
